<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}deploy-hook{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Pretendard Variable"', '"Pretendard"', '-apple-system', 'BlinkMacSystemFont', 'system-ui', '"Segoe UI"', 'Roboto', 'sans-serif'],
                        mono: ['"JetBrains Mono"', '"Fira Code"', 'monospace'],
                    },
                    colors: {
                        surface: {
                            0: '#0a0a0f',
                            1: '#12121a',
                            2: '#1a1a25',
                            3: '#222230',
                        },
                        accent: {
                            DEFAULT: '#6c5ce7',
                            light: '#a29bfe',
                            subtle: 'rgba(108, 92, 231, 0.12)',
                        },
                        mint: {
                            DEFAULT: '#00cec9',
                            light: '#81ecec',
                            subtle: 'rgba(0, 206, 201, 0.12)',
                        },
                        coral: {
                            DEFAULT: '#ff6b6b',
                            light: '#ff8787',
                            subtle: 'rgba(255, 107, 107, 0.12)',
                        },
                        sun: {
                            DEFAULT: '#ffc048',
                            light: '#ffd271',
                            subtle: 'rgba(255, 192, 72, 0.12)',
                        },
                    },
                },
            },
        }
    </script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }
        ::selection { background: rgba(108, 92, 231, 0.3); }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="min-h-screen bg-surface-0 font-sans text-white/90 antialiased">
    <div class="pointer-events-none fixed inset-0 -z-10">
        <div class="absolute -left-40 -top-40 h-[600px] w-[600px] rounded-full bg-accent/[0.07] blur-[120px]"></div>
        <div class="absolute -bottom-32 -right-32 h-[500px] w-[500px] rounded-full bg-mint/[0.05] blur-[120px]"></div>
    </div>

    <nav class="sticky top-0 z-50 border-b border-white/[0.06] bg-surface-0/80 backdrop-blur-xl">
        <div class="mx-auto flex h-16 max-w-7xl items-center justify-between px-6">
            <a href="/" class="flex items-center gap-3 transition hover:opacity-80">
                <div class="flex h-8 w-8 items-center justify-center rounded-lg bg-accent">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                </div>
                <span class="text-[15px] font-semibold tracking-tight">deploy-hook</span>
            </a>
            {% if request.session.get('authenticated') %}
            <div class="flex items-center gap-2">
                <a href="/" class="rounded-lg px-3 py-2 text-[13px] font-medium text-white/50 transition hover:bg-white/[0.06] hover:text-white/80">Projects</a>
                <div class="mx-1 h-4 w-px bg-white/10"></div>
                <form method="POST" action="/logout">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
                    <button type="submit" class="rounded-lg px-3 py-2 text-[13px] font-medium text-coral/70 transition hover:bg-coral/10 hover:text-coral">Logout</button>
                </form>
            </div>
            {% endif %}
        </div>
    </nav>

    <main class="mx-auto max-w-7xl px-6 py-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
